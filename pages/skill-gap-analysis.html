<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Gap Analysis - Career Bridge</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --primary-light: #818cf8;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1a1a2e;
            --light: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%), 
                        repeating-linear-gradient(45deg, rgba(102,126,234,0.02) 0px, rgba(102,126,234,0.02) 2px, transparent 2px, transparent 8px);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background shapes */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(102,126,234,0.1) 0%, transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(118,75,162,0.1) 0%, transparent 30%);
            pointer-events: none;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        .floating-shape {
            position: fixed;
            background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .shape1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 5%;
            animation: float 15s ease-in-out infinite;
        }

        .shape2 {
            width: 500px;
            height: 500px;
            bottom: -100px;
            right: -100px;
            background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%);
            animation: float 25s ease-in-out infinite reverse;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(102,126,234,0.1);
            color: var(--dark); 
            padding: 15px 30px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            animation: slideInLeft 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: shimmer 2s infinite;
        }

        .navbar h1 { 
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar a { 
            color: white;
            text-decoration: none; 
            font-weight: 600; 
            padding: 10px 20px; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 8px; 
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .navbar a:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            animation: fadeIn 0.6s ease-out;
        }

        .card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(102,126,234,0.1); 
            margin-bottom: 30px;
            transition: all 0.3s;
            animation: scaleIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .card:hover::before {
            transform: translateX(0);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(102,126,234,0.2);
        }

        .card h2 { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 25px; 
            border-bottom: 2px solid rgba(102,126,234,0.2); 
            padding-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
            font-size: 1.8rem;
        }

        .skill-row { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 15px; 
            padding: 15px 20px; 
            background: white;
            border-radius: 12px; 
            transition: all 0.3s;
            border: 1px solid var(--gray-200);
            animation: slideInRight 0.3s ease-out;
            position: relative;
            overflow: hidden;
        }

        .skill-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .skill-row:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.15);
            border-color: var(--primary);
        }

        .skill-row:hover::before {
            opacity: 1;
        }

        .skill-name { 
            font-weight: 600; 
            color: var(--gray-700); 
            min-width: 140px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar { 
            flex: 1; 
            background: var(--gray-200);
            border-radius: 30px; 
            height: 12px; 
            overflow: hidden;
            position: relative;
        }

        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            transition: width 1s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .skill-level { 
            min-width: 100px; 
            text-align: right; 
            font-weight: 600; 
            color: var(--primary);
            font-size: 1rem;
        }

        .gap { 
            color: var(--danger);
        }

        .roadmap { 
            background: linear-gradient(135deg, rgba(102,126,234,0.05) 0%, rgba(118,75,162,0.05) 100%);
            padding: 30px; 
            border-radius: 15px; 
            border-left: 4px solid var(--primary);
        }

        .roadmap h3 { 
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .road-item { 
            padding: 25px; 
            margin-bottom: 20px; 
            background: white;
            border-radius: 12px; 
            border-left: 4px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
            animation: slideInLeft 0.3s ease-out;
        }

        .road-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102,126,234,0.15);
        }

        .resource-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; 
            margin-top: 15px; 
        }

        .resource-card { 
            background: linear-gradient(135deg, #fff 0%, var(--gray-100) 100%);
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--gray-200);
            transition: all 0.3s;
            animation: scaleIn 0.3s ease-out;
        }

        .resource-card:hover { 
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(102,126,234,0.2);
            border-color: var(--primary);
        }

        .resource-card h4 { 
            color: var(--gray-700);
            margin-bottom: 10px; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .resource-links { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-top: 10px;
        }

        .resource-link { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 10px 16px; 
            background: white;
            border: 1px solid var(--gray-300); 
            border-radius: 8px; 
            color: var(--gray-700); 
            text-decoration: none; 
            font-size: 0.9rem; 
            transition: all 0.3s;
            flex: 1;
            justify-content: center;
        }

        .resource-link.youtube { 
            color: #ff0000;
        }

        .resource-link:hover { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        .resource-link.youtube:hover { 
            background: #ff0000;
            color: white;
        }

        .btn { 
            padding: 14px 28px; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toast { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            padding: 16px 24px; 
            border-radius: 12px; 
            color: white; 
            font-weight: 600; 
            z-index: 9999; 
            animation: slideInLeft 0.3s ease-out;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .toast-success { 
            background: linear-gradient(135deg, var(--success) 0%, #34d399 100%);
        }

        .toast-info { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .toast-error { 
            background: linear-gradient(135deg, var(--danger) 0%, #f87171 100%);
        }

        .badge { 
            display: inline-block; 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            margin-left: 10px;
        }

        .badge.beginner { 
            background: linear-gradient(135deg, var(--success) 0%, #34d399 100%);
            color: white; 
        }

        .badge.intermediate { 
            background: linear-gradient(135deg, var(--warning) 0%, #fbbf24 100%);
            color: white; 
        }

        .badge.advanced { 
            background: linear-gradient(135deg, var(--danger) 0%, #f87171 100%);
            color: white; 
        }

        .stats-card { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(102,126,234,0.3);
            animation: scaleIn 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255,255,255,0.1) 20px,
                rgba(255,255,255,0.1) 40px
            );
            animation: shine 10s linear infinite;
        }

        @keyframes shine {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; 
            position: relative;
            z-index: 1;
        }

        .stat-item { 
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }

        .stat-value { 
            font-size: 2.5rem; 
            font-weight: bold;
            line-height: 1.2;
        }

        .stat-label { 
            font-size: 0.9rem; 
            opacity: 0.9;
        }

        .filter-section { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }

        .filter-btn { 
            padding: 10px 20px; 
            background: white;
            border: 1px solid var(--gray-200); 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s;
            font-weight: 500;
            color: var(--gray-600);
        }

        .filter-btn:hover { 
            background: var(--gray-100);
            transform: translateY(-2px);
        }

        .filter-btn.active { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; 
            border-color: transparent;
        }

        select {
            padding: 14px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: white;
            cursor: pointer;
        }

        select:hover {
            border-color: var(--primary);
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .skill-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .skill-name {
                min-width: auto;
            }

            .skill-level {
                text-align: left;
                min-width: auto;
            }

            .resource-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Background Shapes -->
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <div class="navbar">
        <h1>
            <i class="fas fa-chart-line"></i>
            Skill Gap Analysis & Learning Resources
        </h1>
        <a href="student-dashboard.html">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    <div class="container">
        <!-- SELECT JOB -->
        <div class="card">
            <h2>
                <i class="fas fa-briefcase"></i>
                Select a Job to Compare Skills
            </h2>
            <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
                <select id="jobSelect" style="flex: 1; padding: 14px; border: 2px solid var(--gray-200); border-radius: 10px; font-size: 1em; min-width: 250px;">
                    <option value="">-- Choose a Job --</option>
                </select>
                <button class="btn" onclick="analyzeGap()">
                    <i class="fas fa-search"></i> Analyze Gap
                </button>
                <button class="btn" onclick="refreshJobData()" style="background: linear-gradient(135deg, var(--success) 0%, #34d399 100%);">
                    <i class="fas fa-sync"></i> Refresh Jobs
                </button>
            </div>
        </div>

        <!-- QUICK STATS -->
        <div class="stats-card" id="statsCard" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- YOUR SKILLS -->
        <div class="card">
            <h2>
                <i class="fas fa-check-circle"></i>
                Your Current Skills
            </h2>
            <div id="yourSkills" style="padding: 20px; text-align: center; color: var(--gray-400);">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>Loading your skills...</p>
            </div>
        </div>

        <!-- SKILL GAP -->
        <div class="card">
            <h2>
                <i class="fas fa-chart-bar"></i>
                Skill Gap Analysis
            </h2>
            <div id="skillGapAnalysis" style="padding: 20px; text-align: center; color: var(--gray-400);">
                <i class="fas fa-hand-pointer fa-2x" style="margin-bottom: 10px;"></i>
                <p>Select a job to analyze</p>
            </div>
        </div>

        <!-- LEARNING ROADMAP -->
        <div class="card">
            <h2>
                <i class="fas fa-road"></i>
                Your Personalized Learning Roadmap
            </h2>
            <div class="filter-section" id="filterSection" style="display: none;">
                <button class="filter-btn active" onclick="filterResources('all')">
                    <i class="fas fa-globe"></i> All Resources
                </button>
                <button class="filter-btn" onclick="filterResources('beginner')">
                    <i class="fas fa-seedling"></i> Beginner
                </button>
                <button class="filter-btn" onclick="filterResources('intermediate')">
                    <i class="fas fa-chart-line"></i> Intermediate
                </button>
                <button class="filter-btn" onclick="filterResources('advanced')">
                    <i class="fas fa-crown"></i> Advanced
                </button>
            </div>
            <div id="roadmapContent" style="padding: 20px; text-align: center; color: var(--gray-400);">
                <i class="fas fa-road fa-2x" style="margin-bottom: 10px;"></i>
                <p>Your personalized roadmap with real working links will appear here</p>
            </div>
        </div>
    </div>

    <script src="../js/config/supabase-config.js"></script>

        // Default job data if none exists
        const defaultJobs = [
            {
                title: "Frontend Developer",
                company_name: "Google",
                skills: ["HTML", "CSS", "JavaScript", "React"],
                location: "Mountain View, CA"
            },

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideInLeft 0.3s ease-out reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function normalizeSkills(rawSkills) {
            if (Array.isArray(rawSkills)) {
                return rawSkills.map(s => String(s || '').trim()).filter(Boolean);
            }
            if (typeof rawSkills === 'string') {
                return rawSkills.split(',').map(s => s.trim()).filter(Boolean);
            }
            return [];
        }

        function normalizeJob(job) {
            if (!job) return null;
            const normalized = {
                ...job,
                id: job.id || `job_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
                title: job.title || 'Untitled Role',
                company_name: job.company_name || job.company || 'Company',
                location: job.location || 'N/A',
                skills: normalizeSkills(job.skills),
                status: job.status || 'active',
                created_at: job.created_at || new Date().toISOString()
            };
            return normalized;
        }

        async function loadRealJobs() {
            let localJobs = [];
            try {
                const saved = localStorage.getItem(STORAGE_KEYS.COMPANY_JOBS);
                if (saved) {
                    localJobs = JSON.parse(saved)
                        .map(normalizeJob)
                        .filter(job => job && job.status === 'active');
                }
            } catch (e) {
                console.warn('Could not parse local company jobs:', e.message);
            }

            let supabaseJobs = [];
            try {
                if (window.supabaseClient) {
                    const { data, error } = await window.supabaseClient
                        .from('job_posts')
                        .select('*')
                        .eq('status', 'active')
                        .order('created_at', { ascending: false });

                    if (!error && Array.isArray(data)) {
                        supabaseJobs = data.map(normalizeJob).filter(Boolean);
                    }
                }
            } catch (e) {
                console.warn('Could not load jobs from Supabase:', e.message);
            }

            const mergedMap = new Map();
            [...localJobs, ...supabaseJobs].forEach(job => {
                const key = job.id || `${job.title}_${job.company_name}`;
                mergedMap.set(key, job);
            });

            const mergedJobs = Array.from(mergedMap.values());
            allJobs = mergedJobs.length > 0 ? mergedJobs : defaultJobs;
            updateJobSelect();
            return mergedJobs.length;
        }

        async function refreshJobData() {
            const count = await loadRealJobs();
            if (count > 0) {
                showToast(`✅ Refreshed ${count} real posted jobs`, 'success');
            } else {
                showToast('⚠️ No posted jobs found, showing fallback jobs', 'info');
            }
        }

        function updateJobSelect() {
            const jobSelect = document.getElementById('jobSelect');
            jobSelect.innerHTML = '<option value="">-- Choose a Job --</option>' + 
                allJobs.map((job, i) => `<option value="${i}">${job.title} at ${job.company_name} (${job.location})</option>`).join('');
        }

        async function loadUserSkills() {
            let loadedSkills = [];

            try {
                let userId = null;
                if (window.supabaseClient) {
                    const { data: { user } } = await window.supabaseClient.auth.getUser();
                    userId = user?.id || null;

                    if (userId) {
                        const { data: profileData } = await window.supabaseClient
                            .from('student_profiles')
                            .select('current_skills, skills')
                            .eq('user_id', userId)
                            .maybeSingle();

                        if (profileData) {
                            loadedSkills = normalizeSkills(profileData.current_skills || profileData.skills);
                        }

                        if (loadedSkills.length === 0) {
                            const userProfileKey = `${STORAGE_KEYS.STUDENT_PROFILE}_${userId}`;
                            const storedUserProfile = localStorage.getItem(userProfileKey);
                            if (storedUserProfile) {
                                const parsed = JSON.parse(storedUserProfile);
                                loadedSkills = normalizeSkills(parsed.current_skills || parsed.skills);
                            }
                        }
                    }
                }
            } catch (e) {
                console.warn('Could not load user skills from Supabase:', e.message);
            }

            if (loadedSkills.length === 0) {
                try {
                    const profile = localStorage.getItem(STORAGE_KEYS.STUDENT_PROFILE);
                    if (profile) {
                        const data = JSON.parse(profile);
                        loadedSkills = normalizeSkills(data.current_skills || data.skills);
                    }
                } catch (e) {
                    console.warn('Could not parse local student profile:', e.message);
                }
            }

            userSkills = loadedSkills;
        }

        async function loadData() {
            const jobsCount = await loadRealJobs();
            await loadUserSkills();

            displayUserSkills();
            
            if (userSkills.length === 0) {
                showToast('⚠️ Please add skills to your profile first!', 'info');
            } else {
                showToast(`✅ Loaded ${userSkills.length} skills from your profile`, 'success');
            }

            if (jobsCount === 0) {
                showToast('⚠️ No real company jobs found. Showing fallback jobs.', 'info');
            }
        }

        function displayUserSkills() {
            let userSkillsHTML = '';
            userSkills.forEach(skill => {
                userSkillsHTML += `
                    <div class="skill-row">
                        <div class="skill-name">
                            <i class="fas fa-check-circle" style="color: var(--success);"></i>
                            ${skill}
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 100%;"></div>
                        </div>
                        <div class="skill-level">
                            <span class="badge beginner">Expert</span>
                        </div>
                    </div>
                `;
            });

            if (userSkills.length === 0) {
                userSkillsHTML = '<p style="color: var(--gray-400); text-align: center;"><i class="fas fa-exclamation-circle"></i> No skills added yet. Add skills to your profile!</p>';
            }

            document.getElementById('yourSkills').innerHTML = userSkillsHTML;
        }

        function displayStats(matched, gaps, requiredSkills) {
            const matchPercentage = Math.round((matched.length / requiredSkills.length) * 100) || 0;
            document.getElementById('statsCard').style.display = 'block';
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${requiredSkills.length}</div>
                    <div class="stat-label">Required Skills</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${matched.length}</div>
                    <div class="stat-label">Matched Skills</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${gaps.length}</div>
                    <div class="stat-label">Skills to Learn</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${matchPercentage}%</div>
                    <div class="stat-label">Match Score</div>
                </div>
            `;
        }

        window.analyzeGap = () => {
            const select = document.getElementById('jobSelect');
            const index = select.value;

            if (!index) {
                showToast('❌ Please select a job', 'error');
                return;
            }

            const job = allJobs[index];
            const requiredSkills = job.skills || [];
            const gaps = requiredSkills.filter(s => !userSkills.includes(s));
            const matched = requiredSkills.filter(s => userSkills.includes(s));
            
            currentGapSkills = gaps;

            // Display stats
            displayStats(matched, gaps, requiredSkills);

            // Display user skills with progress
            let userSkillsHTML = '';
            userSkills.forEach(skill => {
                const isMatched = matched.includes(skill);
                userSkillsHTML += `
                    <div class="skill-row">
                        <div class="skill-name">
                            <i class="fas fa-${isMatched ? 'check-circle' : 'times-circle'}" style="color: ${isMatched ? 'var(--success)' : 'var(--gray-400)'};"></i>
                            ${skill}
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 100%; ${isMatched ? 'background: linear-gradient(90deg, var(--success) 0%, #34d399 100%);' : ''}"></div>
                        </div>
                        <div class="skill-level">
                            ${isMatched ? '<span class="badge beginner">Matched!</span>' : '<span class="badge intermediate">Expert</span>'}
                        </div>
                    </div>
                `;
            });

            if (userSkills.length === 0) {
                userSkillsHTML = '<p style="color: var(--gray-400); text-align: center;">No skills added yet</p>';
            }

            document.getElementById('yourSkills').innerHTML = userSkillsHTML;

            // Analyze gaps
            let gapHTML = `
                <div style="margin-bottom: 30px;">
                    <h3 style="color: var(--success); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-check-circle"></i> Matching Skills (${matched.length}/${requiredSkills.length})
                    </h3>
                    ${matched.length > 0 ? matched.map(s => `
                        <div class="skill-row">
                            <div class="skill-name">
                                <i class="fas fa-check-circle" style="color: var(--success);"></i>
                                ${s}
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 100%; background: linear-gradient(90deg, var(--success) 0%, #34d399 100%);"></div>
                            </div>
                            <div class="skill-level">
                                <span class="badge beginner">Match!</span>
                            </div>
                        </div>
                    `).join('') : '<p style="color: var(--gray-400);">No matching skills found</p>'}
                </div>

                <div>
                    <h3 style="color: var(--danger); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-exclamation-triangle"></i> Skills You Need to Learn (${gaps.length})
                    </h3>
                    ${gaps.length > 0 ? gaps.map(s => `
                        <div class="skill-row">
                            <div class="skill-name gap">
                                <i class="fas fa-times-circle" style="color: var(--danger);"></i>
                                ${s}
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 30%; background: var(--danger);"></div>
                            </div>
                            <div class="skill-level">
                                <span class="badge advanced">Gap</span>
                            </div>
                        </div>
                    `).join('') : '<p style="color: var(--success);">Great! You have all the required skills for this job!</p>'}
                </div>
            `;

            document.getElementById('skillGapAnalysis').innerHTML = gapHTML;
            document.getElementById('filterSection').style.display = 'flex';
            showToast(`📊 Analyzing gap for "${job.title}" at ${job.company_name}...`, 'info');

            // Generate roadmap with real resources
            generateRoadmap(gaps);
        };

        function generateRoadmap(gapSkills) {
            let roadmapHTML = '<div class="roadmap">';
            
            if (gapSkills.length === 0) {
                roadmapHTML += `
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-trophy" style="font-size: 4rem; color: #ffc107; margin-bottom: 20px;"></i>
                        <h3 style="color: var(--success);">🎉 Congratulations!</h3>
                        <p style="color: var(--gray-600); font-size: 1.1rem; margin-top: 10px;">You have all the required skills for this job!</p>
                        <p style="color: var(--gray-400); margin-top: 10px;">Consider applying for this position or check other jobs to find more learning opportunities.</p>
                    </div>
                `;
            } else {
                const totalDays = gapSkills.reduce((sum, skill) => {
                    const resources = resourceDatabase[skill]?.beginner || [];
                    return sum + (resources.length > 0 ? 30 : 0);
                }, 0);

                roadmapHTML += `
                    <h3>
                        <i class="fas fa-road"></i> Your Learning Journey (${Math.ceil(totalDays / 7)} weeks estimated)
                    </h3>
                    <p style="color: var(--gray-500); margin-bottom: 25px;">
                        Click on any resource below to start learning immediately with real working links!
                    </p>
                `;

                gapSkills.forEach((skill, index) => {
                    const resources = resourceDatabase[skill] || {
                        beginner: [
                            { name: `Learn ${skill} Basics`, type: 'youtube', url: `https://www.youtube.com/results?search_query=${skill}+tutorial`, duration: 'Self-paced', platform: 'YouTube Search' },
                            { name: `${skill} Tutorial`, type: 'website', url: `https://www.google.com/search?q=${skill}+tutorial`, duration: 'Self-paced', platform: 'Search Resources' }
                        ]
                    };

                    const allResources = [
                        ...(resources.beginner || []),
                        ...(resources.intermediate || []),
                        ...(resources.advanced || [])
                    ];

                    roadmapHTML += `
                        <div class="road-item">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <strong style="font-size: 1.2rem; color: var(--primary);">
                                    <i class="fas fa-${index + 1}"></i> Week ${index + 1}: Master ${skill}
                                </strong>
                                <span class="badge ${index === 0 ? 'beginner' : index === 1 ? 'intermediate' : 'advanced'}">
                                    ${index === 0 ? 'Beginner' : index === 1 ? 'Intermediate' : 'Advanced'}
                                </span>
                            </div>
                            
                            <div class="resource-grid">
                                ${allResources.map(res => `
                                    <div class="resource-card" data-level="${res.type === 'youtube' ? 'beginner' : 'intermediate'}">
                                        <h4>
                                            <i class="fab fa-${res.type === 'youtube' ? 'youtube' : 'chrome'}" 
                                               style="color: ${res.type === 'youtube' ? '#ff0000' : 'var(--primary)'};"></i>
                                            ${res.name}
                                        </h4>
                                        <p style="color: var(--gray-500); font-size: 0.85rem; margin-bottom: 10px;">
                                            <i class="far fa-clock"></i> ${res.duration} • ${res.platform}
                                        </p>
                                        <div class="resource-links">
                                            <a href="${res.url}" target="_blank" class="resource-link ${res.type}">
                                                <i class="fas fa-${res.type === 'youtube' ? 'play' : 'globe'}"></i>
                                                ${res.type === 'youtube' ? 'Watch on YouTube' : 'Visit Website'}
                                            </a>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });

                roadmapHTML += `
                    <div style="margin-top: 30px; padding: 20px; background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%); border-radius: 12px; color: #155724;">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <i class="fas fa-check-circle" style="font-size: 2rem;"></i>
                            <div>
                                <strong>✅ Quick Start Tips:</strong>
                                <ul style="margin-top: 10px; margin-left: 20px;">
                                    <li>Start with beginner resources (marked in green)</li>
                                    <li>Practice coding daily for at least 1 hour</li>
                                    <li>Complete one module/course per week</li>
                                    <li>Build small projects to reinforce learning</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            }

            roadmapHTML += '</div>';
            document.getElementById('roadmapContent').innerHTML = roadmapHTML;
            showToast('✅ Personalized learning roadmap generated with real resources!', 'success');
        }

        window.filterResources = (level) => {
            const cards = document.querySelectorAll('.resource-card');
            const buttons = document.querySelectorAll('.filter-btn');
            
            buttons.forEach(btn => {
                if (btn.textContent.toLowerCase().includes(level)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            cards.forEach(card => {
                if (level === 'all') {
                    card.style.display = 'block';
                } else {
                    if (card.dataset.level === level) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });

            showToast(`Showing ${level} resources`, 'info');
        };

        // Initialize on load
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
