<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job - Career Bridge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .form-container {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #28a745;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-briefcase"></i> Post a New Job</h1>
            <p>Fill in the details below to post a job and find the perfect candidate</p>
        </div>
        <div class="form-container">
            <div id="alert" class="alert"></div>
            
            <form id="postJobForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Job Title *</label>
                        <input type="text" id="jobTitle" placeholder="e.g., Senior Software Engineer" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Job Type *</label>
                        <select id="jobType" required>
                            <option value="">Select type...</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Internship">Internship</option>
                            <option value="Freelance">Freelance</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-briefcase"></i> Experience Required *</label>
                        <input type="text" id="experience" placeholder="e.g., 2-4 years" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-money-bill-wave"></i> Salary *</label>
                        <input type="text" id="salary" placeholder="e.g., 5-8 LPA" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Location *</label>
                    <input type="text" id="location" placeholder="e.g., Bangalore, Mumbai" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Job Description *</label>
                    <textarea id="description" rows="6" placeholder="Describe the job role, responsibilities, and requirements..." required></textarea>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-code"></i> Required Skills *</label>
                    <input type="text" id="skills" placeholder="e.g., JavaScript, React, Python, SQL" required>
                    <small style="color: #666;">Separate skills with commas</small>
                </div>

                <!-- Hidden status field - always active -->
                <input type="hidden" id="jobStatus" value="active">

                <button type="submit" class="btn">
                    <i class="fas fa-paper-plane"></i> Post Job
                </button>
            </form>

            <a href="company-dashboard.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config/supabase-config.js"></script>
    <script src="../js/auth/auth.js"></script>

    <script>
        (function() {
            'use strict';

            console.log('✅ Post Job page loaded');

            const form = document.getElementById('postJobForm');
            const alertDiv = document.getElementById('alert');

            function showAlert(message, type) {
                alertDiv.className = `alert alert-${type}`;
                alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
                alertDiv.style.display = 'block';
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                }, 5000);
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Get form values
                const jobData = {
                    id: 'job_' + Date.now(),
                    title: document.getElementById('jobTitle').value,
                    type: document.getElementById('jobType').value,
                    experience: document.getElementById('experience').value,
                    salary: document.getElementById('salary').value,
                    location: document.getElementById('location').value,
                    description: document.getElementById('description').value,
                    skills: document.getElementById('skills').value.split(',').map(s => s.trim()),
                    status: 'active', // CRITICAL: Must be 'active' for students to see
                    posted_date: new Date().toLocaleDateString('en-IN'),
                    created_at: new Date().toISOString(),
                    applications: 0
                };

                // Get company info
                const companyProfile = JSON.parse(localStorage.getItem('companyProfile') || '{}');
                jobData.company_name = companyProfile.company_name || companyProfile.name || 'Company';
                jobData.company_id = companyProfile.id || 'company_' + Date.now();
                jobData.company_logo = companyProfile.logo_url || companyProfile.logo || '';
                jobData.logo_url = companyProfile.logo_url || companyProfile.logo || '';

                try {
                    // Save to localStorage
                    const existingJobs = JSON.parse(localStorage.getItem('companyJobs') || '[]');
                    existingJobs.push(jobData);
                    localStorage.setItem('companyJobs', JSON.stringify(existingJobs));

                    // Try to save to Supabase
                    try {
                        const { data: { user } } = await supabase.client.auth.getUser();
                        if (user) {
                            await supabase.db.insert('job_posts', {
                                ...jobData,
                                user_id: user.id
                            });
                        }
                    } catch (supabaseError) {
                        console.log('Supabase save failed, but job saved locally');
                    }

                    showAlert('✅ Job posted successfully! Students can now see this job.', 'success');
                    
                    // Reset form
                    form.reset();
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'company-dashboard.html';
                    }, 2000);

                } catch (error) {
                    console.error('Error posting job:', error);
                    showAlert('❌ Failed to post job: ' + error.message, 'danger');
                }
            });

        })();
    </script>
</body>
</html>
